<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#eaf1f7;
  -webkit-tap-highlight-color: transparent;
}

/* SMOOTH */
*{
  transition: all 0.2s ease;
}

/* HOME */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0f5ea8,#1d9bf0);
  color:white;
  padding-bottom:90px;
}

/* HEADER */
.header{padding:20px;}
.header h2{font-size:14px;opacity:0.8;}
.header h1{font-size:20px;margin-top:4px;}

/* CARD UPGRADE */
.card{
  margin:0 20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(25px);
  border-radius:22px;
  padding:20px;
  position:relative;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* SALDO */
.saldo{
  font-size:32px;
  font-weight:700;
  letter-spacing:0.5px;
}

.eye{
  position:absolute;
  right:20px;
  top:20px;
  cursor:pointer;
}

/* SWIPE MENU */
.menu{
  margin:20px;
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.menu::-webkit-scrollbar{display:none;}

/* MENU */
.menu-item{
  min-width:85px;
  background:white;
  color:black;
  border-radius:18px;
  padding:12px;
  text-align:center;
  font-size:13px;
  font-weight:500;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.menu-item:active{
  transform:scale(0.95);
}

/* ICON */
.icon{
  width:50px;
  height:50px;
  background:linear-gradient(135deg,#1d9bf0,#0f5ea8);
  color:white;
  border-radius:50%;
  margin:0 auto 6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

/* LIST */
.list{margin:20px;}
.item{
  background:white;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  animation:fadeIn 0.3s ease;
}

.masuk{color:#16a34a;}
.keluar{color:#dc2626;}

/* MODAL BACKDROP */
.backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}
.backdrop.active{display:block;}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#1d9bf0,#0f5ea8);
  color:white;
  font-weight:600;
  font-size:14px;
}

button:active{
  transform:scale(0.97);
}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:25px 25px 0 0;
  transition:0.3s;
  box-shadow:0 -10px 30px rgba(0,0,0,0.2);
}

.modal.active{bottom:0;}

.modal input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #eee;
}

/* CUSTOM DROPDOWN */
/* SELECT */
.select{
  background:#f1f5f9;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  font-size:14px;
}

.options{
  display:none;
  background:white;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

.options div{
  padding:10px;
  border-bottom:1px solid #eee;
}
.options div:last-child{border:none;}
.options.show{display:block;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:14px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.1);
  font-size:18px;
}

.filter-box{
  margin:20px;
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.filter-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #eee;
  margin-bottom:10px;
  font-size:14px;
}

.filter-row{
  display:flex;
  gap:10px;
}

.filter-row input{
  flex:1;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* TOAST NOTIFICATION */
#toast-container{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toast{
  min-width:250px;
  max-width:90vw;
  padding:14px 16px;
  border-radius:14px;
  color:white;
  font-size:14px;
  font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:slideDown 0.4s ease;
  touch-action: pan-y;
}

/* SWIPE EFFECT */
.toast.swiping{
  transition:none;
}

.toast.removing{
  opacity:0;
  transform:translateX(120%);
}

/* VARIANT */
.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
.toast.info{background:#0f5ea8;}

/* ANIMATION */
@keyframes slideDown{
  from{
    opacity:0;
    transform:translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.toast.hide{
  animation:fadeOut 0.4s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    transform:translateY(-20px);
  }
}
</style>
</head>

<body>

<div class="home">

  <div class="header">
    <h2>Halo,</h2>
    <h1>NOUR MAANDHITO</h1>
  </div>

  <div class="card">
    <small>Saldo Aktif</small>
    <div class="saldo" id="saldo">Rp 0</div>
    <div class="eye" onclick="toggleSaldo()">👁️</div>
  </div>

  <!-- SWIPE MENU -->
  <div class="menu">
    <div class="menu-item" onclick="openModal('saldo')">
      <div class="icon">💰</div>Saldo
    </div>
    <div class="menu-item" onclick="openModal('transaksi')">
      <div class="icon">➕</div>Transaksi
    </div>
    <div class="menu-item" onclick="toggleList()">
      <div class="icon">📄</div>Mutasi
    </div>
    <div class="menu-item" onclick="openHistory()">
      <div class="icon">🔔</div>Notif
    </div>
    <div class="menu-item" onclick="resetData()">
      <div class="icon">♻️</div>Reset
    </div>
  </div>

<div class="filter-box">
  <input id="search" placeholder="🔍 Cari transaksi..." oninput="render()">

  <div class="filter-row">
    <input type="month" id="filterBulan" onchange="render()">
    <input type="date" id="filterTanggal" onchange="render()">
  </div>
</div>

<div class="list" id="list"></div>
</div>

<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<!-- BACKDROP -->
<div id="backdrop" class="backdrop" onclick="closeModal()"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<div id="toast-container"></div>

<script>
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data;
try{
  data = JSON.parse(localStorage.getItem("data")) || [];
}catch{
  data = [];
}
let notifFilter = "all";
let notifHistory = JSON.parse(localStorage.getItem("notifHistory")) || [];
let showSaldo = true;
let selectedTipe="masuk";
let selectedKategori="lainnya";

/* FORMAT */
function rupiah(n){
  return "Rp " + n.toLocaleString("id-ID");
}

function formatTanggal(date){
  return new Date(date).toLocaleDateString("id-ID", {
    day:"numeric",
    month:"long",
    year:"numeric"
  });
}

function formatJam(date){
  return new Date(date).toLocaleTimeString("id-ID", {
    hour:"2-digit",
    minute:"2-digit"
  });
}

/* ANIMASI SALDO */
function animateSaldo(target){
  let el = document.getElementById("saldo");
  let start = 0;
  let duration = 500;
  let startTime = null;

  function anim(t){
    if(!startTime) startTime = t;
    let progress = t - startTime;
    let percent = Math.min(progress/duration,1);
    let val = Math.floor(percent * target);

    el.innerText = showSaldo ? rupiah(val) : "••••••";

    if(progress < duration) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

/* FILTER */
function applyFilter(arr){
  let search = document.getElementById("search")?.value.toLowerCase() || "";
  let bulan = document.getElementById("filterBulan")?.value;
  let tanggal = document.getElementById("filterTanggal")?.value;

  return arr.filter(d=>{
    let text = (d.ket + " " + (d.kategori||"")).toLowerCase();

    let matchSearch = text.includes(search);

    let matchBulan = true;
    if(bulan){
      let dBulan = new Date(d.time).toISOString().slice(0,7);
      matchBulan = dBulan === bulan;
    }

    let matchTanggal = true;
    if(tanggal){
      let dTgl = new Date(d.time).toISOString().slice(0,10);
      matchTanggal = dTgl === tanggal;
    }

    return matchSearch && matchBulan && matchTanggal;
  });
}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  animateSaldo(saldo);

  let filtered = applyFilter(data);

  renderMutasi(filtered);
}

/* MUTASI */
function renderMutasi(arr){
  let list = document.getElementById("list");

  let grouped = {};

  arr.slice().reverse().forEach(d=>{
    let tgl = formatTanggal(d.time);
    if(!grouped[tgl]) grouped[tgl]=[];
    grouped[tgl].push(d);
  });

  let html="";

  for(let tgl in grouped){
    html+=`
    <div style="margin-bottom:15px;">
      <div style="color:#64748b;font-size:12px;margin-bottom:5px;">
        ${tgl}
      </div>
    `;

    grouped[tgl].forEach(d=>{
      html+=`
      <div class="item">
        <div>
          <div style="font-size:14px;">${d.ket}</div>
          <div style="font-size:11px;color:#64748b;">
            ${formatJam(d.time)} • ${d.kategori||"-"}
          </div>
        </div>

        <div class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}${rupiah(d.nominal)}
        </div>
      </div>`;
    });

    html+=`</div>`;
  }

  list.innerHTML = html;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
    <h3>Tambah Saldo</h3>
    <input id="saldoInput" type="number">
    <button onclick="tambahSaldo()">Simpan</button>`;
  }

  if(type==="transaksi"){
    html=`
    <h3>Tambah Transaksi</h3>
    <input id="nominal" type="number" placeholder="Nominal">
    <input id="ket" placeholder="Keterangan">

    <div class="select select-tipe" onclick="toggleDropdown()">Pilih Tipe</div>
    <div class="options" id="dropdown">
      <div onclick="setTipe('masuk')">Pemasukan</div>
      <div onclick="setTipe('keluar')">Pengeluaran</div>
    </div>

    <div class="select select-kategori" onclick="toggleKategori()">Pilih Kategori</div>
    <div class="options" id="dropdownKat">
      <div onclick="setKategori('makan')">🍔 Makan</div>
      <div onclick="setKategori('transport')">🚗 Transport</div>
      <div onclick="setKategori('belanja')">🛍️ Belanja</div>
      <div onclick="setKategori('lainnya')">💼 Lainnya</div>
    </div>

    <button onclick="tambah()">Simpan</button>`;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
  document.getElementById("backdrop").classList.add("active");
}

/* DROPDOWN */
function toggleDropdown(){
  document.getElementById("dropdown").classList.toggle("show");
}

function toggleKategori(){
  document.getElementById("dropdownKat").classList.toggle("show");
}

function setTipe(val){
  selectedTipe = val;
  document.querySelector(".select-tipe").innerText =
    val==="masuk"?"Pemasukan":"Pengeluaran";

  document.getElementById("dropdown").classList.remove("show");
}

function setKategori(val){
  selectedKategori = val;
  document.querySelector(".select-kategori").innerText = val;

  document.getElementById("dropdownKat").classList.remove("show");
}

/* ACTION */
function tambahSaldo(){
  vibrate();

  let n = Number(document.getElementById("saldoInput").value);

  if(!n || n <= 0){
    showToast("Nominal saldo tidak valid","error");
    return;
  }

  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);

  showToast("Saldo berhasil ditambahkan 💰","success", n, "masuk", "Top Up Saldo");

  closeModal();
  render();
  generateInsight();
}

function tambah(){
  vibrate();
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value.trim();

  // VALIDASI WAJIB
  if(!nominal || nominal <= 0){
    showToast("Nominal harus benar","error");
    return;
  }

  if(!ket){
    showToast("Keterangan wajib diisi","error");
    return;
  }

  if(!selectedTipe){
    showToast("Pilih tipe transaksi","error");
    return;
  }

  if(!selectedKategori){
    showToast("Pilih kategori","error");
    return;
  }

  data.push({
    nominal,
    ket,
    tipe:selectedTipe,
    kategori:selectedKategori,
    time:new Date().toISOString()
  });

  localStorage.setItem("data", JSON.stringify(data));

  // NOTIF BERBEDA
  if(selectedTipe === "masuk"){
    showToast("Pemasukan berhasil ditambahkan 💸","success", nominal, "masuk", ket);
  }else{
    showToast("Pengeluaran tercatat ⚠️","error", nominal, "keluar", ket);
  }
  
  closeModal();
  render();
  generateInsight();

  // RESET STATE (INI PENTING)
  selectedTipe = "masuk";
  selectedKategori = "lainnya";
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.getElementById("backdrop").classList.remove("active");
}

function toggleList(){
  let l=document.getElementById("list");
  l.style.display="block";
}

function resetData(){
  if(confirm("Yakin mau reset semua data?")){
    localStorage.clear();
    showToast("Data berhasil direset","info");
    setTimeout(()=>location.reload(),1000);
  }
}

function toggleSaldo(){
  showSaldo=!showSaldo;
  render();
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(30);
}

function showToast(message, type="info", nominal=0, tipeTransaksi=null, ket=""){
  const container = document.getElementById("toast-container");

  notifHistory.unshift({
    message,
    type,
    nominal,
    tipeTransaksi,
    ket,
    time:new Date().toISOString()
  });

  localStorage.setItem("notifHistory", JSON.stringify(notifHistory));
  
  const toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.innerText = message;

  container.appendChild(toast);

  // SOUND SAFE
  try{
    const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-bell-notification-933.mp3");
    audio.play();
  }catch(e){}

  // TAP CLOSE
  toast.onclick = () => removeToast(toast);

  // SWIPE LOGIC
  let startX = 0;
  let currentX = 0;
  let isDragging = false;

  toast.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    isDragging = true;
  });

  toast.addEventListener("touchmove", e=>{
    if(!isDragging) return;
    currentX = e.touches[0].clientX - startX;

    toast.classList.add("swiping");
    toast.style.transform = `translateX(${currentX}px)`;
  });

  toast.addEventListener("touchend", ()=>{
    isDragging = false;
    toast.classList.remove("swiping");

    if(Math.abs(currentX) > 80){
      removeToast(toast);
    }else{
      toast.style.transform = "";
    }
  });

  // AUTO HIDE
  setTimeout(()=>{
    removeToast(toast);
  },3000);
}

function removeToast(toast){
  toast.classList.add("removing");
  setTimeout(()=>toast.remove(),300);
}

function openHistory(){
  unreadNotif = 0;
  updateBadge();

  let html = `
    <h3>Riwayat Notifikasi</h3>

    <div style="display:flex;gap:8px;margin:10px 0;">
      <button onclick="setNotifFilter('all')">Semua</button>
      <button onclick="setNotifFilter('masuk')">Masuk</button>
      <button onclick="setNotifFilter('keluar')">Keluar</button>
    </div>
  `;

  let filtered = notifHistory.filter(n=>{
    if(notifFilter === "all") return true;
    return n.tipeTransaksi === notifFilter;
  });

  if(filtered.length === 0){
    html += `<p style="font-size:14px;color:#64748b;">Tidak ada data</p>`;
  }

  filtered.forEach(n=>{
    let warna = "#0f5ea8";
    let simbol = "";
    let icon = "🔔";

    if(n.tipeTransaksi === "masuk"){
      warna = "#16a34a";
      simbol = "+";
      icon = "💸";
    }else if(n.tipeTransaksi === "keluar"){
      warna = "#dc2626";
      simbol = "-";
      icon = "💳";
    }

    html += `
    <div class="item" style="align-items:flex-start;">
      
      <div style="display:flex;gap:10px;">
        <div style="font-size:20px;">${icon}</div>

        <div>
          <div style="font-size:14px;font-weight:500;">
            ${n.message}
          </div>

          ${
            n.ket
            ? `<div style="font-size:12px;color:#64748b;">
                ${n.ket}
              </div>`
            : ""
          }

          <div style="font-size:11px;color:#94a3b8;margin-top:2px;">
            ${formatTanggal(n.time)} • ${formatJam(n.time)}
          </div>
        </div>
      </div>

      ${
        n.nominal
        ? `<div style="color:${warna};font-weight:600;">
            ${simbol}${rupiah(n.nominal)}
          </div>`
        : ""
      }

    </div>
    `;
  });

  html += `<button onclick="clearNotif()">Hapus Semua</button>`;

  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").classList.add("active");
  document.getElementById("backdrop").classList.add("active");
}

function clearNotif(){
  notifHistory = [];
  localStorage.removeItem("notifHistory");
  openHistory();
}

function setNotifFilter(type){
  notifFilter = type;
  openHistory();
}

let lastInsightTime = 0;

function canShowInsight(){
  let now = Date.now();
  if(now - lastInsightTime > 10000){
    lastInsightTime = now;
    return true;
  }
  return false;
}

function generateInsight(){
  if(data.length < 3) return;
  if(!canShowInsight()) return;
  let totalMasuk = 0;
  let totalKeluar = 0;

  let kategoriCount = {};

  data.forEach(d=>{
    if(d.tipe === "masuk"){
      totalMasuk += d.nominal;
    }else{
      totalKeluar += d.nominal;
    }

    // hitung kategori
    if(!kategoriCount[d.kategori]){
      kategoriCount[d.kategori] = 0;
    }
    kategoriCount[d.kategori]++;
  });

  // 🔍 insight 1: pengeluaran > pemasukan
  if(totalKeluar > totalMasuk){
    showToast("⚠️ Pengeluaran lebih besar dari pemasukan","error");
  }

  // 🔍 insight 2: kategori paling sering
  let topKategori = Object.keys(kategoriCount).reduce((a,b)=>
    kategoriCount[a] > kategoriCount[b] ? a : b
  );

  if(kategoriCount[topKategori] >= 3){
    showToast(`📊 Kamu sering transaksi di kategori ${topKategori}`,"info");
  }

  // 🔍 insight 3: saldo rendah
  let saldo = saldoManual;
  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  if(saldo < 50000){
    showToast("💸 Saldo kamu mulai menipis","error");
  }
}

function shortRupiah(n){
  if(n >= 1000000) return "Rp " + (n/1000000).toFixed(1)+"jt";
  if(n >= 1000) return "Rp " + (n/1000).toFixed(0)+"rb";
  return rupiah(n);
}

document.addEventListener("click", function(e){
  if(!e.target.closest(".select")){
    document.querySelectorAll(".options").forEach(o=>{
      o.classList.remove("show");
    });
  }
});

document.addEventListener("input", function(e){
  if(e.target.type === "number"){
    if(e.target.value < 0) e.target.value = "";
  }
});

render();
</script>

</body>
</html>
