<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyBCA Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#f1f5f9;
}

/* SCREEN */
.screen{display:none;}
.active{display:block;}

/* ================= LOGIN PAGE ================= */
.login-page{
  padding:20px;
}

.logo{
  font-size:28px;
  color:#0ea5e9;
  font-weight:bold;
  margin-top:40px;
}

.user-box{
  margin-top:40px;
}

.user-name{
  font-size:18px;
  font-weight:bold;
}

.user-phone{
  opacity:0.6;
}

.btn{
  margin-top:40px;
  width:100%;
  padding:15px;
  border-radius:30px;
  border:none;
  background:#0ea5e9;
  color:white;
  font-size:18px;
}

/* ================= PIN PAGE ================= */
.pin-page{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.pin-dots{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.dot{
  width:15px;
  height:15px;
  border-radius:50%;
  background:#cbd5e1;
}

.dot.active{
  background:#0ea5e9;
}

/* ================= HOME ================= */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0ea5e9,#2563eb);
  color:white;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
}

.card{
  margin-top:20px;
  background:white;
  color:black;
  border-radius:20px;
  padding:20px;
}

.saldo{
  font-size:24px;
  font-weight:bold;
}

.menu{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.menu div{
  text-align:center;
  font-size:12px;
}

/* NAVBAR */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="login" class="screen active login-page">
  <div class="logo">myBCA</div>

  <div class="user-box">
    <div class="user-name">Halo, NOUR MAANDHITO</div>
    <div class="user-phone">08********1</div>
  </div>

  <button class="btn" onclick="goPin()">Masuk</button>
</div>

<!-- SCREEN 2 -->
<div id="pin" class="screen pin-page">
  <h3>Masukkan PIN</h3>

  <div class="pin-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="home" class="screen home">
  
  <div class="header">
    <div>myBCA</div>
    <div>⚙️</div>
  </div>

  <div class="card">
    <div>Saldo Aktif</div>
    <div class="saldo" id="saldo">Rp 0</div>
    <button onclick="tambahSaldo()">+ Isi Saldo</button>
  </div>

  <div class="menu">
    <div>Transfer</div>
    <div>QRIS</div>
    <div>Top Up</div>
    <div>History</div>
  </div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>📄</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<script>
let currentPin="";
let savedPin = localStorage.getItem("pin") || "1234";
let saldo = Number(localStorage.getItem("saldo")) || 0;

/* PIN SETUP */
if(!localStorage.getItem("pin")){
  let p = prompt("Buat PIN:");
  localStorage.setItem("pin", p);
  savedPin = p;
}

function goPin(){
  switchScreen("pin");
}

/* INPUT PIN */
document.addEventListener("keydown",(e)=>{
  if(document.getElementById("pin").classList.contains("active")){
    if(!isNaN(e.key)){
      currentPin += e.key;
      updateDots();
    }

    if(currentPin.length===4){
      if(currentPin===savedPin){
        switchScreen("home");
        render();
      }else{
        alert("PIN salah");
        currentPin="";
        updateDots();
      }
    }
  }
});

function updateDots(){
  let dots = document.querySelectorAll(".dot");
  dots.forEach((d,i)=>{
    d.classList.toggle("active", i < currentPin.length);
  });
}

/* SALDO */
function tambahSaldo(){
  let n = prompt("Isi saldo:");
  saldo += Number(n);
  localStorage.setItem("saldo", saldo);
  render();
}

function render(){
  document.getElementById("saldo").innerText =
    "Rp " + saldo.toLocaleString();
}

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
