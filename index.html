<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;}
body{background:#eaf1f7;}

/* HOME */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0f5ea8,#1d9bf0);
  color:white;
  padding-bottom:90px;
}

/* HEADER */
.header{padding:20px;}
.header h2{font-size:14px;opacity:0.8;}
.header h1{font-size:20px;margin-top:4px;}

/* CARD */
.card{
  margin:0 20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  position:relative;
}

.saldo{font-size:30px;font-weight:bold;margin-top:10px;}
.eye{position:absolute;right:20px;top:20px;cursor:pointer;}

/* MENU */
.menu{
  margin:20px;
  display:flex;
  gap:10px;
}

.menu button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:white;
}

/* FILTER */
.filter{
  display:flex;
  gap:10px;
  margin:0 20px;
}

.filter button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:white;
}

.filter .active{background:white;color:black;}

/* LIST */
.list{margin:20px;}

.group{
  margin-bottom:20px;
}

.group-title{
  font-size:12px;
  opacity:0.7;
  margin-bottom:8px;
}

.item{
  background:white;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:8px;
}

.top{
  display:flex;
  justify-content:space-between;
}

.bottom{
  font-size:11px;
  opacity:0.6;
  margin-top:5px;
}

.masuk{color:#16a34a;}
.keluar{color:#dc2626;}

/* MODAL */
.backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}
.backdrop.active{display:block;}

.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}
.modal.active{bottom:0;}

.modal input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:12px;
}
</style>
</head>

<body>

<div class="home">

  <div class="header">
    <h2>Halo,</h2>
    <h1>NOUR MAANDHITO</h1>
  </div>

  <div class="card">
    <small>Saldo Aktif</small>
    <div class="saldo" id="saldo">Rp 0</div>
    <div class="eye" onclick="toggleSaldo()">👁️</div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button onclick="openModal('saldo')">Tambah Saldo</button>
    <button onclick="openModal('transaksi')">Transaksi</button>
    <button onclick="resetData()">Reset</button>
  </div>

  <!-- FILTER -->
  <div class="filter">
    <button id="harianBtn" class="active" onclick="setFilter('harian')">Harian</button>
    <button id="bulananBtn" onclick="setFilter('bulanan')">Bulanan</button>
  </div>

  <div class="list" id="list"></div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>👤</div>
</div>

<div id="backdrop" class="backdrop" onclick="closeModal()"></div>

<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data = JSON.parse(localStorage.getItem("data")) || [];
let showSaldo = true;
let filterMode = "harian";

/* FORMAT */
function rupiah(n){return "Rp "+n.toLocaleString("id-ID");}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  document.getElementById("saldo").innerText =
    showSaldo ? rupiah(saldo) : "••••••";

  let grouped = {};

  data.forEach(d=>{
    let date = new Date(d.time);
    let key = filterMode==="harian"
      ? date.toLocaleDateString("id-ID")
      : date.toLocaleDateString("id-ID",{month:"long",year:"numeric"});

    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(d);
  });

  let html="";

  Object.keys(grouped).reverse().forEach(k=>{
    html+=`<div class="group"><div class="group-title">${k}</div>`;

    grouped[k].forEach(d=>{
      let t = new Date(d.time);
      let jam = t.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

      html+=`
      <div class="item">
        <div class="top">
          <span>${d.ket}</span>
          <span class="${d.tipe}">
            ${d.tipe==="masuk"?"+":"-"}${rupiah(d.nominal)}
          </span>
        </div>
        <div class="bottom">${jam}</div>
      </div>`;
    });

    html+=`</div>`;
  });

  document.getElementById("list").innerHTML=html;
}

/* FILTER */
function setFilter(mode){
  filterMode = mode;

  document.getElementById("harianBtn").classList.remove("active");
  document.getElementById("bulananBtn").classList.remove("active");

  document.getElementById(mode+"Btn").classList.add("active");

  render();
}

/* TOGGLE */
function toggleSaldo(){
  showSaldo=!showSaldo;
  render();
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
    <h3>Tambah Saldo</h3>
    <input id="saldoInput" type="number">
    <button onclick="tambahSaldo()">Simpan</button>`;
  }

  if(type==="transaksi"){
    html=`
    <h3>Tambah Transaksi</h3>
    <input id="nominal" type="number">
    <input id="ket" placeholder="Keterangan">

    <select id="tipe">
      <option value="masuk">Pemasukan</option>
      <option value="keluar">Pengeluaran</option>
    </select>

    <button onclick="tambah()">Simpan</button>`;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
  document.getElementById("backdrop").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.getElementById("backdrop").classList.remove("active");
}

/* ACTION */
function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;
  let tipe = document.getElementById("tipe").value;

  data.push({
    nominal,
    ket,
    tipe,
    time: new Date().toISOString()
  });

  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function resetData(){
  localStorage.clear();
  location.reload();
}

render();
</script>

</body>
</html>
