<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{background:#f1f5f9;}

.screen{display:none;}
.active{display:block;}

/* LOGIN */
.login-page{padding:20px;}
.logo{font-size:28px;color:#0ea5e9;font-weight:bold;margin-top:40px;}
.user-box{margin-top:40px;}
.user-name{font-size:18px;font-weight:bold;}
.user-phone{opacity:0.6;}
.btn{
  margin-top:40px;
  width:100%;
  padding:15px;
  border-radius:30px;
  border:none;
  background:#0ea5e9;
  color:white;
}

/* PIN */
.pin-page{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.pin-dots{display:flex;gap:15px;margin-top:20px;}
.dot{
  width:15px;height:15px;border-radius:50%;
  background:#cbd5e1;
}
.dot.active{background:#0ea5e9;}

/* HOME */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0ea5e9,#2563eb);
  color:white;
  padding:20px;
}
.header{
  display:flex;
  justify-content:space-between;
}
.card{
  margin-top:20px;
  background:white;
  color:black;
  border-radius:20px;
  padding:20px;
}
.saldo{font-size:24px;font-weight:bold;}

.menu{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.menu div{
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
  text-align:center;
  font-size:12px;
}

/* LIST */
.list{
  margin-top:20px;
}
.item{
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}
.masuk{color:green;}
.keluar{color:red;}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}
.modal.active{bottom:0;}

.modal input, .modal select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active login-page">
  <div class="logo">myBCA</div>
  <div class="user-box">
    <div class="user-name">Halo, NOUR MAANDHITO</div>
    <div class="user-phone">08********1</div>
  </div>
  <button class="btn" onclick="goPin()">Masuk</button>
</div>

<!-- PIN -->
<div id="pin" class="screen pin-page">
  <h3>Masukkan PIN</h3>
  <div class="pin-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen home">
  <div class="header">
    <div>myBCA</div>
    <div>⚙️</div>
  </div>

  <div class="card">
    <div>Saldo Aktif</div>
    <div class="saldo" id="saldo">Rp 0</div>
  </div>

  <div class="menu">
    <div onclick="openModal('saldo')">+ Saldo</div>
    <div onclick="openModal('transaksi')">+ Transaksi</div>
    <div onclick="toggleList()">Riwayat</div>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="nav">
  <div>🏠</div>
  <div>📄</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
let currentPin="";
let savedPin = localStorage.getItem("pin") || "1234";

let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data = JSON.parse(localStorage.getItem("data")) || [];

/* PIN SETUP */
if(!localStorage.getItem("pin")){
  let p = prompt("Buat PIN:");
  localStorage.setItem("pin", p);
  savedPin = p;
}

function goPin(){switchScreen("pin");}

/* INPUT PIN */
document.addEventListener("keydown",(e)=>{
  if(document.getElementById("pin").classList.contains("active")){
    if(!isNaN(e.key)){
      currentPin+=e.key;
      updateDots();
    }

    if(currentPin.length===4){
      if(currentPin===savedPin){
        switchScreen("home");
        render();
      }else{
        alert("PIN salah");
        currentPin="";
        updateDots();
      }
    }
  }
});

function updateDots(){
  let dots=document.querySelectorAll(".dot");
  dots.forEach((d,i)=>{
    d.classList.toggle("active", i<currentPin.length);
  });
}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  document.getElementById("saldo").innerText =
    "Rp "+saldo.toLocaleString();

  let html="";
  data.slice().reverse().forEach(d=>{
    html+=`
      <div class="item">
        <span>${d.ket}</span>
        <span class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}Rp ${d.nominal}
        </span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
      <h3>Tambah Saldo</h3>
      <input id="saldoInput" type="number" placeholder="Nominal">
      <button onclick="tambahSaldo()">Simpan</button>
    `;
  }

  if(type==="transaksi"){
    html=`
      <h3>Tambah Transaksi</h3>
      <input id="nominal" type="number" placeholder="Nominal">
      <input id="ket" placeholder="Keterangan">
      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <button onclick="tambah()">Simpan</button>
    `;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
}

function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;
  let tipe = document.getElementById("tipe").value;

  data.push({nominal,ket,tipe});
  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function toggleList(){
  let l=document.getElementById("list");
  l.style.display = l.style.display==="none"?"block":"none";
}

/* NAV */
function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
