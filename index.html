<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#0b1220;
  color:white;
}

/* LOGIN PIN (BANK STYLE) */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.pin-box{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.pin-box input{
  width:50px;
  height:60px;
  border-radius:12px;
  border:none;
  text-align:center;
  font-size:22px;
  background:#1e293b;
  color:white;
}

/* APP */
.hidden{display:none;}

.container{
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
  font-size:14px;
  opacity:0.7;
}

/* SALDO CARD */
.card{
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 40px rgba(37,99,235,0.4);
  margin-bottom:20px;
}

.saldo{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.action-btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  font-size:12px;
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-radius:15px;
  background:#111827;
  margin-bottom:10px;
}

.masuk{color:#4ade80;}
.keluar{color:#f87171;}

/* MODAL */
#modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:#020617;
  border-radius:20px 20px 0 0;
  padding:20px;
  transition:0.3s;
}

#modal.active{
  bottom:0;
}

.modalBox input,select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.modalBox button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h3>Masukkan PIN</h3>
  <div class="pin-box">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
    <input maxlength="1">
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden container">

  <div class="header">
    <span>MyFinance</span>
    <span onclick="toggleSaldo()">👁️</span>
  </div>

  <div class="card">
    <div>Saldo Aktif</div>
    <div class="saldo" id="saldo">Rp 0</div>

    <div class="actions">
      <button class="action-btn" onclick="openModal('saldo')">+ Saldo</button>
      <button class="action-btn" onclick="openModal('transaksi')">+ Transaksi</button>
    </div>
  </div>

  <div id="list"></div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="modalBox" id="modalContent"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let showSaldo = true;

/* PIN */
if(!localStorage.getItem("pin")){
  localStorage.setItem("pin","1234");
}

const inputs = document.querySelectorAll(".pin-box input");

inputs.forEach((input,i)=>{
  input.addEventListener("input",()=>{
    if(input.value && i < 3) inputs[i+1].focus();

    let pin = Array.from(inputs).map(x=>x.value).join("");
    if(pin.length === 4){
      if(pin === localStorage.getItem("pin")){
        loginSuccess();
      }else{
        alert("PIN salah");
        inputs.forEach(x=>x.value="");
        inputs[0].focus();
      }
    }
  });
});

function loginSuccess(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    if(d.tipe==="masuk") saldo+=d.nominal;
    else saldo-=d.nominal;
  });

  document.getElementById("saldo").innerText =
    showSaldo ? "Rp "+saldo.toLocaleString() : "••••••";

  let list="";
  data.slice().reverse().forEach(d=>{
    list+=`
      <div class="item">
        <div>${d.ket}</div>
        <div class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}Rp ${d.nominal}
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=list;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
      <h3>Tambah Saldo</h3>
      <input id="saldoInput" type="number" placeholder="Nominal">
      <button onclick="tambahSaldo()">Simpan</button>
    `;
  }

  if(type==="transaksi"){
    html=`
      <h3>Tambah Transaksi</h3>
      <input id="nominal" type="number" placeholder="Nominal">
      <input id="ket" placeholder="Keterangan">
      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <button onclick="tambah()">Simpan</button>
    `;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
}

function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

/* TAMBAH TRANSAKSI */
function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;
  let tipe = document.getElementById("tipe").value;

  data.push({nominal,ket,tipe});
  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function toggleSaldo(){
  showSaldo=!showSaldo;
  render();
}
</script>

</body>
</html>
