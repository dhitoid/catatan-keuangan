<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#eaf1f7;
}

/* SCREEN */
.screen{display:none;}
.active{display:block;}

/* ================= LOGIN ================= */
.login{
  padding:20px;
}

.logo{
  font-size:26px;
  color:#1d9bf0;
  font-weight:bold;
  margin-top:60px;
}

.user{
  margin-top:30px;
}

.user h3{
  font-size:18px;
}

.user p{
  opacity:0.6;
}

.btn{
  margin-top:40px;
  width:100%;
  padding:16px;
  border-radius:30px;
  border:none;
  background:#0f5ea8;
  color:white;
  font-size:16px;
}

/* ================= PIN ================= */
.pin{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.pin input{
  font-size:28px;
  letter-spacing:15px;
  text-align:center;
  border:none;
  outline:none;
  background:none;
}

/* ================= HOME ================= */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0f5ea8,#1d9bf0);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CARD */
.card{
  margin:20px;
  background:linear-gradient(135deg,#3ec6ff,#00a6ff);
  border-radius:20px;
  padding:20px;
  color:white;
}

.card small{
  opacity:0.8;
}

.saldo{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* MENU */
.menu{
  margin:20px;
  background:white;
  border-radius:20px;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
  font-size:12px;
  color:black;
}

/* LIST */
.list{
  margin:20px;
}

.item{
  background:white;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.masuk{color:#16a34a;}
.keluar{color:#dc2626;}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}

.modal.active{bottom:0;}

.modal input, .modal select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active login">
  <div class="logo">myBCA</div>

  <div class="user">
    <h3>Halo, NOUR MAANDHITO</h3>
    <p>08********1</p>
  </div>

  <button class="btn" onclick="goPin()">Masuk</button>
</div>

<!-- PIN -->
<div id="pin" class="screen pin">
  <h3>Masukkan PIN</h3>
  <input type="password" maxlength="4" id="pinInput" autofocus>
</div>

<!-- HOME -->
<div id="home" class="screen home">

  <div class="header">
    <div>myBCA</div>
    <div>⚙️</div>
  </div>

  <div class="card">
    <small>Saldo Aktif</small>
    <div class="saldo" id="saldo">Rp 0</div>
  </div>

  <div class="menu">
    <div onclick="openModal('saldo')">Saldo</div>
    <div onclick="openModal('transaksi')">Transaksi</div>
    <div onclick="toggleList()">Mutasi</div>
    <div onclick="openModal('transaksi')">Lainnya</div>
  </div>

  <div class="list" id="list"></div>

</div>

<div class="nav">
  <div>🏠</div>
  <div>📄</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
let savedPin = localStorage.getItem("pin") || "1234";
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data = JSON.parse(localStorage.getItem("data")) || [];

/* SET PIN */
if(!localStorage.getItem("pin")){
  let p = prompt("Buat PIN:");
  localStorage.setItem("pin", p);
  savedPin = p;
}

/* PIN FIX (IMPORTANT) */
document.getElementById("pinInput").addEventListener("input", function(){
  let val = this.value;

  if(val.length === 4){
    if(val === savedPin){
      switchScreen("home");
      render();
    }else{
      alert("PIN salah");
      this.value="";
    }
  }
});

function goPin(){switchScreen("pin");}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  document.getElementById("saldo").innerText =
    "Rp "+saldo.toLocaleString();

  let html="";
  data.slice().reverse().forEach(d=>{
    html+=`
      <div class="item">
        <span>${d.ket}</span>
        <span class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}Rp ${d.nominal}
        </span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
      <h3>Tambah Saldo</h3>
      <input id="saldoInput" type="number">
      <button onclick="tambahSaldo()">Simpan</button>
    `;
  }

  if(type==="transaksi"){
    html=`
      <h3>Tambah Transaksi</h3>
      <input id="nominal" type="number">
      <input id="ket" placeholder="Keterangan">
      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <button onclick="tambah()">Simpan</button>
    `;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
}

function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;
  let tipe = document.getElementById("tipe").value;

  data.push({nominal,ket,tipe});
  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function toggleList(){
  let l=document.getElementById("list");
  l.style.display = l.style.display==="none"?"block":"none";
}

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
