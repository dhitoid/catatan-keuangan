<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{background:#eaf1f7;}

/* HOME */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0f5ea8,#1d9bf0);
  color:white;
  padding-bottom:90px;
}

/* HEADER */
.header{padding:20px;}
.header h2{font-size:14px;opacity:0.8;}
.header h1{font-size:20px;margin-top:4px;}

/* CARD */
.card{
  margin:0 20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  position:relative;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.saldo{
  font-size:30px;
  font-weight:bold;
  margin-top:10px;
}

.eye{
  position:absolute;
  right:20px;
  top:20px;
  cursor:pointer;
}

/* SWIPE MENU */
.menu{
  margin:20px;
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.menu::-webkit-scrollbar{display:none;}

.menu-item{
  min-width:80px;
  background:white;
  color:black;
  border-radius:20px;
  padding:10px;
  text-align:center;
  scroll-snap-align:start;
}

.icon{
  width:50px;
  height:50px;
  background:#eaf1f7;
  border-radius:50%;
  margin:0 auto 5px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LIST */
.list{margin:20px;}
.item{
  background:white;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}
.masuk{color:#16a34a;}
.keluar{color:#dc2626;}

/* MODAL BACKDROP */
.backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}
.backdrop.active{display:block;}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}
.modal.active{bottom:0;}

.modal input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #eee;
}

/* CUSTOM DROPDOWN */
.select{
  background:#f1f5f9;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.options{
  display:none;
  background:white;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  margin-bottom:10px;
}

.options div{
  padding:10px;
  border-bottom:1px solid #eee;
}
.options div:last-child{border:none;}
.options.show{display:block;}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:12px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="home">

  <div class="header">
    <h2>Halo,</h2>
    <h1>NOUR MAANDHITO</h1>
  </div>

  <div class="card">
    <small>Saldo Aktif</small>
    <div class="saldo" id="saldo">Rp 0</div>
    <div class="eye" onclick="toggleSaldo()">👁️</div>
  </div>

  <!-- SWIPE MENU -->
  <div class="menu">
    <div class="menu-item" onclick="openModal('saldo')">
      <div class="icon">💰</div>Saldo
    </div>
    <div class="menu-item" onclick="openModal('transaksi')">
      <div class="icon">➕</div>Transaksi
    </div>
    <div class="menu-item" onclick="toggleList()">
      <div class="icon">📄</div>Mutasi
    </div>
    <div class="menu-item" onclick="resetData()">
      <div class="icon">♻️</div>Reset
    </div>
  </div>

<div style="margin:20px;">
  <input id="search" placeholder="Cari transaksi..." oninput="render()" 
  style="width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:10px;">

  <input type="month" id="filterBulan" onchange="render()" 
  style="width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:10px;">

  <input type="date" id="filterTanggal" onchange="render()" 
  style="width:100%;padding:10px;border-radius:10px;border:none;">
</div>

<div class="list" id="list"></div>
</div>

<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<!-- BACKDROP -->
<div id="backdrop" class="backdrop" onclick="closeModal()"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data = JSON.parse(localStorage.getItem("data")) || [];
let showSaldo = true;
let selectedTipe="masuk";
let selectedKategori="lainnya";

/* FORMAT */
function rupiah(n){
  return "Rp " + n.toLocaleString("id-ID");
}

function formatTanggal(date){
  return new Date(date).toLocaleDateString("id-ID", {
    day:"numeric",
    month:"long",
    year:"numeric"
  });
}

function formatJam(date){
  return new Date(date).toLocaleTimeString("id-ID", {
    hour:"2-digit",
    minute:"2-digit"
  });
}

/* ANIMASI SALDO */
function animateSaldo(target){
  let el = document.getElementById("saldo");
  let start = 0;
  let duration = 500;
  let startTime = null;

  function anim(t){
    if(!startTime) startTime = t;
    let progress = t - startTime;
    let percent = Math.min(progress/duration,1);
    let val = Math.floor(percent * target);

    el.innerText = showSaldo ? rupiah(val) : "••••••";

    if(progress < duration) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

/* FILTER */
function applyFilter(arr){
  let search = document.getElementById("search")?.value.toLowerCase() || "";
  let bulan = document.getElementById("filterBulan")?.value;
  let tanggal = document.getElementById("filterTanggal")?.value;

  return arr.filter(d=>{
    let text = (d.ket + " " + (d.kategori||"")).toLowerCase();

    let matchSearch = text.includes(search);

    let matchBulan = true;
    if(bulan){
      let dBulan = new Date(d.time).toISOString().slice(0,7);
      matchBulan = dBulan === bulan;
    }

    let matchTanggal = true;
    if(tanggal){
      let dTgl = new Date(d.time).toISOString().slice(0,10);
      matchTanggal = dTgl === tanggal;
    }

    return matchSearch && matchBulan && matchTanggal;
  });
}

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  animateSaldo(saldo);

  let filtered = applyFilter(data);

  renderMutasi(filtered);
}

/* MUTASI */
function renderMutasi(arr){
  let list = document.getElementById("list");

  let grouped = {};

  arr.slice().reverse().forEach(d=>{
    let tgl = formatTanggal(d.time);
    if(!grouped[tgl]) grouped[tgl]=[];
    grouped[tgl].push(d);
  });

  let html="";

  for(let tgl in grouped){
    html+=`
    <div style="margin-bottom:15px;">
      <div style="color:#64748b;font-size:12px;margin-bottom:5px;">
        ${tgl}
      </div>
    `;

    grouped[tgl].forEach(d=>{
      html+=`
      <div class="item">
        <div>
          <div style="font-size:14px;">${d.ket}</div>
          <div style="font-size:11px;color:#64748b;">
            ${formatJam(d.time)} • ${d.kategori||"-"}
          </div>
        </div>

        <div class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}${rupiah(d.nominal)}
        </div>
      </div>`;
    });

    html+=`</div>`;
  }

  list.innerHTML = html;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
    <h3>Tambah Saldo</h3>
    <input id="saldoInput" type="number">
    <button onclick="tambahSaldo()">Simpan</button>`;
  }

  if(type==="transaksi"){
    html=`
    <h3>Tambah Transaksi</h3>
    <input id="nominal" type="number" placeholder="Nominal">
    <input id="ket" placeholder="Keterangan">

    <div class="select" onclick="toggleDropdown()">Pilih Tipe</div>
    <div class="options" id="dropdown">
      <div onclick="setTipe('masuk')">Pemasukan</div>
      <div onclick="setTipe('keluar')">Pengeluaran</div>
    </div>

    <div class="select" onclick="toggleKategori()">Pilih Kategori</div>
    <div class="options" id="dropdownKat">
      <div onclick="setKategori('makan')">🍔 Makan</div>
      <div onclick="setKategori('transport')">🚗 Transport</div>
      <div onclick="setKategori('belanja')">🛍️ Belanja</div>
      <div onclick="setKategori('lainnya')">💼 Lainnya</div>
    </div>

    <button onclick="tambah()">Simpan</button>`;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
  document.getElementById("backdrop").classList.add("active");
}

/* DROPDOWN */
function toggleDropdown(){
  document.getElementById("dropdown").classList.toggle("show");
}

function toggleKategori(){
  document.getElementById("dropdownKat").classList.toggle("show");
}

function setTipe(val){
  selectedTipe=val;
  document.querySelectorAll(".select")[0].innerText =
    val==="masuk"?"Pemasukan":"Pengeluaran";
}

function setKategori(val){
  selectedKategori=val;
  document.querySelectorAll(".select")[1].innerText = val;
}

/* ACTION */
function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;

  data.push({
    nominal,
    ket,
    tipe:selectedTipe,
    kategori:selectedKategori,
    time:new Date().toISOString()
  });

  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.getElementById("backdrop").classList.remove("active");
}

function toggleList(){
  let l=document.getElementById("list");
  l.style.display="block";
}

function resetData(){
  localStorage.clear();
  location.reload();
}

function toggleSaldo(){
  showSaldo=!showSaldo;
  render();
}

render();
</script>

</body>
</html>
