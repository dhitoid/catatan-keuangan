<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinance</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#eaf1f7;
}

/* HOME */
.home{
  min-height:100vh;
  background:linear-gradient(180deg,#0f5ea8,#1d9bf0);
  color:white;
  padding-bottom:80px;
}

/* HEADER */
.header{
  padding:20px;
}

.header h2{
  font-size:16px;
  font-weight:400;
}

.header h1{
  font-size:20px;
  margin-top:5px;
}

/* CARD */
.card{
  margin:0 20px;
  background:linear-gradient(135deg,#3ec6ff,#00a6ff);
  border-radius:20px;
  padding:20px;
}

.card small{opacity:0.8;}

.saldo{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* MENU */
.menu{
  margin:20px;
  background:white;
  border-radius:20px;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.menu div{
  text-align:center;
  font-size:12px;
  color:black;
}

.icon{
  width:50px;
  height:50px;
  background:#eaf1f7;
  border-radius:50%;
  margin:0 auto 5px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LIST */
.list{
  margin:20px;
}

.item{
  background:white;
  color:black;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.masuk{color:#16a34a;}
.keluar{color:#dc2626;}

/* MODAL */
.modal{
  position:fixed;
  bottom:-100%;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}

.modal.active{bottom:0;}

.modal input, .modal select{
  width:100%;
  padding:12px;
  margin-bottom:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<div class="home">

  <!-- HEADER -->
  <div class="header">
    <h2>Halo,</h2>
    <h1>NOUR MAANDHITO</h1>
  </div>

  <!-- SALDO -->
  <div class="card">
    <small>Saldo Aktif</small>
    <div class="saldo" id="saldo">Rp 0</div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <div onclick="openModal('saldo')">
      <div class="icon">💰</div>
      Saldo
    </div>
    <div onclick="openModal('transaksi')">
      <div class="icon">➕</div>
      Transaksi
    </div>
    <div onclick="toggleList()">
      <div class="icon">📄</div>
      Mutasi
    </div>
    <div onclick="resetData()">
      <div class="icon">♻️</div>
      Reset
    </div>
  </div>

  <!-- LIST -->
  <div class="list" id="list"></div>

</div>

<!-- NAV -->
<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>⭐</div>
  <div>👤</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
let saldoManual = Number(localStorage.getItem("saldoManual")) || 0;
let data = JSON.parse(localStorage.getItem("data")) || [];

/* RENDER */
function render(){
  let saldo = saldoManual;

  data.forEach(d=>{
    saldo += d.tipe==="masuk"?d.nominal:-d.nominal;
  });

  document.getElementById("saldo").innerText =
    "Rp "+saldo.toLocaleString();

  let html="";
  data.slice().reverse().forEach(d=>{
    html+=`
      <div class="item">
        <span>${d.ket}</span>
        <span class="${d.tipe}">
          ${d.tipe==="masuk"?"+":"-"}Rp ${d.nominal}
        </span>
      </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

/* MODAL */
function openModal(type){
  let html="";

  if(type==="saldo"){
    html=`
      <h3>Tambah Saldo</h3>
      <input id="saldoInput" type="number" placeholder="Nominal">
      <button onclick="tambahSaldo()">Simpan</button>
    `;
  }

  if(type==="transaksi"){
    html=`
      <h3>Tambah Transaksi</h3>
      <input id="nominal" type="number" placeholder="Nominal">
      <input id="ket" placeholder="Keterangan">
      <select id="tipe">
        <option value="masuk">Pemasukan</option>
        <option value="keluar">Pengeluaran</option>
      </select>
      <button onclick="tambah()">Simpan</button>
    `;
  }

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").classList.add("active");
}

function tambahSaldo(){
  let n = Number(document.getElementById("saldoInput").value);
  saldoManual += n;
  localStorage.setItem("saldoManual", saldoManual);
  closeModal();
  render();
}

function tambah(){
  let nominal = Number(document.getElementById("nominal").value);
  let ket = document.getElementById("ket").value;
  let tipe = document.getElementById("tipe").value;

  data.push({nominal,ket,tipe});
  localStorage.setItem("data", JSON.stringify(data));

  closeModal();
  render();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function toggleList(){
  let l=document.getElementById("list");
  l.style.display = l.style.display==="none"?"block":"none";
}

function resetData(){
  localStorage.clear();
  location.reload();
}

render();
</script>

</body>
</html>
